<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - De Altura Wines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/auth.js"></script>
</head>
<body class="bg-stone-50">
    <div class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 bg-white rounded-lg shadow-lg">
            <h1 class="text-2xl font-serif font-bold text-wine-900 mb-6">De Altura Wines</h1>
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-semibold text-stone-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wine-700">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-stone-700 mb-2">Contraseña</label>
                    <input type="password" id="password" name="password" required class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-wine-700">
                </div>
                <button type="submit" class="w-full py-2 bg-wine-900 text-white font-semibold rounded-lg hover:bg-wine-800 transition">
                    Iniciar sesión
                </button>
            </form>
            <p class="text-center text-sm text-stone-600 mt-4">
                ¿No tienes cuenta? <a href="#" class="text-wine-700 font-semibold">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const result = await AuthModule.login(email, password);
            if (result.error) {
                alert('Error: ' + result.error);
            } else {
                window.location.href = '/public/marketplace.html';
            }
        });
    </script>
</body>
</html>
