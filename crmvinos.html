<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Dashboard | De Altura Wines</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wine: { 900: '#360914', 800: '#54101d', 700: '#7a182a' }, gold: { 500: '#C89F5D' } },
                    fontFamily: { sans: ['"Montserrat"', 'sans-serif'], serif: ['"Playfair Display"', 'serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-stone-100 text-stone-800 antialiased flex h-screen overflow-hidden">

    <!-- S I D E B A R -->
    <aside class="w-64 bg-wine-900 text-white flex flex-col hidden md:flex h-full shadow-xl z-20">
        <div class="p-6 border-b border-white/10">
            <h1 class="font-serif text-2xl font-bold tracking-wider text-gold-500">De Altura</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-stone-400 mt-1">CRM & Pedidos</p>
        </div>
        <nav class="flex-1 py-6 px-3 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-wine-800 text-white rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="font-medium text-sm">Órdenes en Vivo</span>
            </a>
        </nav>
        <div class="p-6 border-t border-white/10 flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-gold-500 text-wine-900 flex items-center justify-center font-bold text-sm">A</div>
            <div class="text-sm">
                <p class="font-bold">Administración</p>
                <p class="text-[10px] text-stone-400">DOYO Partner</p>
            </div>
        </div>
    </aside>

    <!-- M A I N   C O N T E N T -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="bg-white border-b border-stone-200 h-16 flex items-center justify-between px-8">
            <div class="flex items-center gap-3">
                <h2 class="text-xl font-bold text-stone-800">Panel de Pedidos</h2>
                <span class="flex items-center gap-1.5 px-2 py-1 bg-green-50 rounded-full border border-green-100">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold text-green-700 uppercase tracking-widest">En Vivo</span>
                </span>
            </div>
            <p class="text-xs text-stone-500 font-medium">BBDD Sincronizada</p>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-stone-50 text-stone-400 text-[10px] uppercase tracking-widest border-b border-stone-200">
                            <tr>
                                <th class="p-4 font-bold">Orden ID</th>
                                <th class="p-4 font-bold">Cliente / Local</th>
                                <th class="p-4 font-bold">Destino</th>
                                <th class="p-4 font-bold">Pago</th>
                                <th class="p-4 font-bold">Estado Envío</th>
                                <th class="p-4 font-bold text-right">Total</th>
                            </tr>
                        </thead>
                        <!-- Contenedor Dinámico -->
                        <tbody id="orders-table" class="text-sm divide-y divide-stone-100">
                            <tr><td colspan="6" class="p-8 text-center text-stone-400 italic">Cargando pedidos en tiempo real...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // INTEGRACIÓN FIREBASE PARA LEER PEDIDOS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'de-altura-crm';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            db = getFirestore(app);
            
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            
            onAuthStateChanged(auth, (user) => {
                if (!user) return;

                // Escuchar la colección de pedidos en tiempo real
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (snapshot) => {
                    const orders = [];
                    snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                    
                    // Ordenar por más reciente
                    orders.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                    renderOrders(orders);
                }, (error) => {
                    console.error("Error leyendo pedidos:", error);
                });
            });
        } catch(e) {
            console.log("Modo desarrollo local.");
            renderOrders([
                { orderId: '#DW-MOCK', clientName: 'Prueba Local', email: 'test@local.com', island: 'Tenerife', paymentMethod: 'stripe', paymentStatus: 'Pagado (Stripe)', shippingStatus: 'Nuevo', total: 427.57 }
            ]);
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('orders-table');
            if(orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-stone-400 italic">No hay pedidos registrados aún.</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(o => {
                const isPaid = o.paymentStatus.includes('Pagado');
                const badgeColor = isPaid ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800';
                
                return `
                    <tr class="hover:bg-stone-50 transition-colors">
                        <td class="p-4 font-bold text-wine-900">${o.orderId}</td>
                        <td class="p-4">
                            <p class="font-bold text-stone-800">${o.clientName}</p>
                            <p class="text-xs text-stone-400">${o.email}</p>
                        </td>
                        <td class="p-4 text-stone-600 font-medium">${o.island}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${badgeColor}">
                                ${o.paymentStatus}
                            </span>
                        </td>
                        <td class="p-4">
                            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-stone-100 text-stone-600 border border-stone-200">
                                ${o.shippingStatus}
                            </span>
                        </td>
                        <td class="p-4 text-right font-bold text-lg text-stone-900">${parseFloat(o.total).toFixed(2).replace('.', ',')} €</td>
                    </tr>
                `;
            }).join('');
        }
    </script>
</body>
</html>
