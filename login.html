<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | De Altura Wines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --wine-dark: #2B0710;
            --brand-gold: #C89F5D;
            --bg-light: #F4F7F6;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--wine-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Montserrat', sans-serif;
            color: var(--wine-dark);
            margin-bottom: 5px;
        }

        .login-card p {
            color: #7F8C8D;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--wine-dark);
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #CBD5E1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--brand-gold);
            color: var(--wine-dark);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1em;
        }

        #error-msg {
            color: #EF4444;
            font-size: 0.85em;
            margin-top: 15px;
            display: none;
            background: #FEF2F2;
            padding: 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2>DE ALTURA</h2>
        <p>Acceso restringido a SuperAdmin</p>
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="admin@dealturawines.com">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" id="loginBtn">Acceder al Panel</button>
        <div id="error-msg"></div>
    </div>

    <script>
        // Usamos un bloque anónimo para evitar que las variables queden "sueltas"
        (function () {
            const URL = 'https://pzzbvinbyzaxrshlmlcn.supabase.co';
            const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6emJ2aW5ieXpheHJzaGxtbGNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTI5NDYsImV4cCI6MjA5MTEyODk0Nn0.YgeGDVZfyqI-nv7iAhROMsBfZbIK7BGUDyU1ERE-SFA';
            const client = supabase.createClient(URL, KEY);

            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('error-msg');

            btn.addEventListener('click', async () => {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                errorMsg.style.display = 'none';
                btn.textContent = 'Verificando...';

                const { data, error } = await client.auth.signInWithPassword({ email, password });

                if (error) {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = 'Error: ' + error.message;
                    btn.textContent = 'Acceder al Panel';
                } else {
                    window.location.href = 'admin.html';
                }
            });
        })();
    </script>
</body>

</html>
