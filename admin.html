<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - De Altura Wines</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #360914 0%, #54101d 100%);
            min-height: 100vh;
            color: #333;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .admin-header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            color: #360914;
            font-size: 2em;
            font-weight: 700;
        }

        .admin-header .info {
            color: #666;
            font-size: 0.9em;
        }

        .logout-btn {
            background: #d32f2f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #b71c1c;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border-left: 4px solid #C89F5D;
        }

        .stat-label {
            color: #999;
            font-size: 0.85em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #360914;
            font-size: 2.5em;
            font-weight: 700;
        }

        .orders-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .orders-section h2 {
            color: #360914;
            margin-bottom: 25px;
            font-size: 1.8em;
            border-bottom: 2px solid #C89F5D;
            padding-bottom: 15px;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }

        .orders-table thead {
            background: #f5f5f5;
        }

        .orders-table th {
            padding: 15px;
            text-align: left;
            color: #360914;
            font-weight: 600;
            border-bottom: 2px solid #eee;
        }

        .orders-table td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .orders-table tbody tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-paid {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-pending {
            background: #fff3e0;
            color: #e65100;
        }

        .status-shipped {
            background: #e3f2fd;
            color: #1565c0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #eee;
            border-top-color: #360914;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .filters {
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: #C89F5D;
            box-shadow: 0 0 0 3px rgba(200, 159, 93, 0.1);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div>
                <h1>📊 Panel de Administración</h1>
                <div class="info">De Altura Wines - Dashboard</div>
            </div>
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </div>

        <!-- Error Message -->
        <div id="error-message" style="display: none;"></div>

        <!-- Dashboard Stats -->
        <div class="dashboard-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total de Órdenes</div>
                <div class="stat-value" id="total-orders">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ingresos Totales</div>
                <div class="stat-value" id="total-revenue">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Órdenes Pagadas</div>
                <div class="stat-value" id="paid-orders">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Órdenes Pendientes</div>
                <div class="stat-value" id="pending-orders">-</div>
            </div>
        </div>

        <!-- Orders Section -->
        <div class="orders-section">
            <h2>Historial de Órdenes</h2>

            <div class="filters">
                <select class="filter-select" id="status-filter" onchange="filterOrders()">
                    <option value="">Todos los Estados</option>
                    <option value="paid">Pagadas</option>
                    <option value="pending">Pendientes</option>
                    <option value="shipped">Enviadas</option>
                </select>
            </div>

            <div id="orders-container">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando órdenes...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://pzzbvinbyzaxrshlmlcn.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB6emJ2aW5ieXpheHJzaGxtbGNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NTI5NDYsImV4cCI6MjA5MTEyODk0Nn0.YgeGDVZfyqI-nv7iAhROMsBfZbIK7BGUDyU1ERE-SFA';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allOrders = [];

        async function loadDashboard() {
            try {
                // Cargar órdenes
                const { data: orders, error: ordersError } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (ordersError) throw ordersError;

                allOrders = orders || [];
                console.log('📦 Órdenes cargadas:', allOrders.length);

                // Calcular estadísticas
                calculateStats(allOrders);

                // Renderizar tabla
                renderOrdersTable(allOrders);

            } catch (error) {
                console.error('Error cargando dashboard:', error);
                showError('Error cargando datos: ' + error.message);
            }
        }

        function calculateStats(orders) {
            const totalOrders = orders.length;
            const totalRevenue = orders.reduce((sum, order) => sum + (parseFloat(order.total_amount) || 0), 0);
            const paidOrders = orders.filter(o => o.payment_status === 'paid').length;
            const pendingOrders = orders.filter(o => o.payment_status === 'pending').length;

            document.getElementById('total-orders').textContent = totalOrders;
            document.getElementById('total-revenue').textContent = totalRevenue.toFixed(2) + ' €';
            document.getElementById('paid-orders').textContent = paidOrders;
            document.getElementById('pending-orders').textContent = pendingOrders;
        }

        function renderOrdersTable(orders) {
            const container = document.getElementById('orders-container');

            if (orders.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No hay órdenes aún</div>';
                return;
            }

            let html = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Email</th>
                            <th>Total</th>
                            <th>Estado Pago</th>
                            <th>Envío</th>
                            <th>Isla</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            orders.forEach(order => {
                const date = new Date(order.created_at).toLocaleDateString('es-ES');
                const paymentStatus = order.payment_status === 'paid' ? 'Pagada' : 'Pendiente';
                const shippingStatus = order.shipping_status === 'shipped' ? 'Enviada' : 'Pendiente';

                html += `
                    <tr>
                        <td><strong>${order.id.slice(0, 8).toUpperCase()}</strong></td>
                        <td>${order.customer_name}</td>
                        <td>${order.customer_email}</td>
                        <td><strong>${parseFloat(order.total_amount).toFixed(2)} €</strong></td>
                        <td>
                            <span class="status-badge status-${order.payment_status}">
                                ${paymentStatus}
                            </span>
                        </td>
                        <td>
                            <span class="status-badge status-${order.shipping_status === 'shipped' ? 'shipped' : 'pending'}">
                                ${shippingStatus}
                            </span>
                        </td>
                        <td>${order.island || '-'}</td>
                        <td>${date}</td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function filterOrders() {
            const filterValue = document.getElementById('status-filter').value;

            if (!filterValue) {
                renderOrdersTable(allOrders);
                return;
            }

            const filtered = allOrders.filter(order => order.payment_status === filterValue);
            renderOrdersTable(filtered);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Cargar dashboard al iniciar
        loadDashboard();

        // Actualizar cada 30 segundos
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
